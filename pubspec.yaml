name: flutter_app
description: "Flutter app starter with Riverpod, code generation, assets runner, and l10n."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  dio: ^5.9.2
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  flutter_gen: ^5.14.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  riverpod_generator: ^4.0.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/config/
    - assets/branding/
    - assets/images/illustrations/
  fonts:
    - family: Anton
      fonts:
        - asset: assets/fonts/Anton-Regular.ttf

flutter_gen:
  output: lib/gen/
  line_length: 100
  integrations:
    flutter_svg: false
    rive: false
  colors:
    inputs:
      - assets/colors/app_colors.xml

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/branding/app_icon.png
    background_color: "#F3F7F6"
    theme_color: "#0F766E"
  windows:
    generate: true
    image_path: assets/branding/app_icon.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/branding/app_icon.png

flutter_native_splash:
  color: "#F3F7F6"
  image: assets/branding/app_icon.png
  android_12:
    color: "#F3F7F6"
    image: assets/branding/app_icon.png
